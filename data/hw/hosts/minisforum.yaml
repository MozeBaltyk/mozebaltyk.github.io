request:
  purpose: Recommend Minisforum host candidates for a home homelab node
  country: PL
  currency: EUR
  host_role: general_purpose
  form_factors:
  - mini_pc
  budget:
    per_unit:
      min: null
      max: 1050
      currency: EUR
  output:
    number_of_options: 3
    ranking_method: best_value_with_required_oculink
    include_alternatives: true
  purchase_preferences:
    condition: new | open-box | used
    allow_barebone: true
    allow_aliexpress: false
    allow_chinese_brands: true
    preferred_sources:
    - Minisforum EU
    - Amazon.pl
    - Amazon.de
    - x-kom
    - Morele
  requirements:
    cpu:
      min_cores: 8
      min_threads: null
      min_passmark: null
      required_family: AMD Ryzen
    memory:
      min_ram_gb: 96
      max_ram_gb: null
      type: DDR5
      consistency_required: true
      note: Use the same RAM configuration on all three nodes. 96 GB via 2x48 GB DDR5 SO-DIMM is the realistic target; 128 GB requires exact SKU and BIOS validation.
    storage:
      min_drive_bays: null
      min_nvme_slots: 2
      min_sata_ports: null
    networking:
      min_ethernet_ports: 1
      wifi_required: false
      min_ethernet_speed: 2.5G | 10G
      sfp_plus_required: false
    gpu_expansion:
      required: false
      llm_gpu_priority: hard_requirement_for_oculink_egpu_experiment
      slot_type: OCuLink
      external_gpu_ok: true
      note: This Minisforum shortlist treats OCuLink as the hard GPU-expansion requirement. MS-01-style low-profile internal PCIe expansion is useful for networking/storage cards but does not satisfy the requested OCuLink eGPU path. For serious local LLM GPU work, still budget for an external GPU dock, PSU, cabling, and NVIDIA GPU, or relax the mini-PC constraint toward SFF/tower/workstation hosts.
      preferred: true
      full_height_required: false
      full_length_required: false
    platform:
      proxmox_ready: true
      kubernetes_ready: true
      docker_ready: true
      ecc_required: false
      quicksync_required: false
    power_noise:
      max_idle_watts: null
      noise_priority: medium
  workloads:
  - OpenShift or OKD compact cluster
  - OpenShift AI / Kubernetes AI lab
  - Local LLM inference and model serving
  - Docker containers and general homelab services
  nice_to_have:
  - USB4 as a secondary external GPU fallback
  - Dual 2.5G Ethernet or better
  - At least two M.2 NVMe slots
  deal_breakers:
  - Non-Minisforum systems
answer:
  metadata:
    options_requested: 3
    options_returned: 3
    ranking_method: best_value_for_3_node_proxmox_cluster_with_required_oculink
    last_reviewed: '2026-06-17'
    pricing_basis: estimated_total = unitary_price * request.cluster.node_count
    pricing_confidence: medium
    constraint_note: Strict Minisforum-only shortlist for Poland/EU. AliExpress is excluded. Unitary price for the recommended option includes a 96 GB DDR5 and 2 TB NVMe planning allowance where the listing is barebone. External GPU, OCuLink dock, PSU, enclosure, cooling, and UPS uplift are excluded from host totals.
  summary:
    recommended_option: Minisforum UM890 Pro, Ryzen 9 8945HS
    rationale: With OCuLink set as a hard GPU-expansion requirement and consistent nodes preferred, the UM890 Pro becomes the best Minisforum fit in this shortlist. It keeps the 3-node 96 GB/node estimate within the 3150 EUR host budget, provides Ryzen 9 performance, dual 2.5G Ethernet, two M.2 NVMe slots, and the required OCuLink eGPU path on matching SKUs.
    llm_gpu_note: UM890 Pro is the best listed Minisforum path for consistent external GPU/LLM-capable nodes because each node can expose OCuLink on matching SKUs. Attach the RTX 4090/5090-class GPU to one worker initially, while keeping all three nodes capable of hosting the eGPU. Budget separately for the eGPU dock, PSU, cables, cooling, GPU, and UPS uplift.
    gpu_budget_not_in_host_total:
      rtx_4090_path:
        min: 2000
        max: 3000
        currency: EUR
      rtx_5090_path:
        min: 2800
        max: 4200
        currency: EUR
      includes:
      - GPU
      - OCuLink eGPU dock
      - ATX PSU
      - OCuLink cable
      - open frame, enclosure, or cooling allowance
  options:
  - rank: 2
    model: Minisforum MS-01, Core i5-12600H
    vendor: Minisforum
    condition: new | open-box
    sold_as: barebone_plus_addons
    estimated_total:
      amount: 1890
      currency: EUR
    unitary_price:
      amount: 630
      currency: EUR
    price_includes:
    - MS-01 barebone mini workstation
    - 32 GB DDR5 SO-DIMM RAM add-on
    - 1 TB NVMe SSD add-on
    hardware:
      cpu:
        model: Intel Core i5-12600H
        cores: 12
        threads: 16
        tdp_watts: 45
      memory:
        included_gb: 32
        max_gb: 64
        type: DDR5 SO-DIMM
      storage:
        included_gb: 1000
        drive_bays: 3
        nvme_slots: 3
        sata_ports: 1
      networking:
        ethernet_ports: 4
        ethernet_speed: 2x 10G SFP+ + 2x 2.5G
        wifi: false
      expansion:
        usb_ports: 6
        pcie_slots: 1
        external_gpu: Internal PCIe expansion is the main benefit; external GPU is possible only through adapters or USB4-style workarounds and is not the primary use case
        gpu_slot: low-profile internal PCIe slot; useful for NICs, HBAs, storage/network cards, or selected low-power GPUs, not full-size LLM GPUs
        llm_gpu_fit: limited; does not satisfy the requested OCuLink eGPU requirement
        networking_upgrade: not needed; includes 2x 10G SFP+ and 2x 2.5G
      power:
        idle_watts: 18
        max_watts: 120
    homelab:
      proxmox_support: true
      vmware_support: false
      docker_ready: true
      kubernetes_ready: true
      quicksync_support: true
      ecc_support: false
      noise_level: low | medium
      vm_capacity: high
    requirement_match:
      score: 0.84
      budget_status: within the former 2500 EUR budget only in lower-RAM form; not suitable for the current 96 GB Ryzen OCuLink requirement
      meets:
      - Strict Minisforum-only option
      - Mini PC form factor
      - At least 8 CPU cores per node
      - At least two storage positions
      - 2.5G and 10G networking
      - Best networking and storage expansion in the shortlist
      - Real low-profile PCIe expansion for networking, storage, and selected low-power cards
      - Proxmox, Docker, and Kubernetes lab workloads
      partially_meets:
      - Official RAM ceiling is commonly 64 GB rather than 96 GB; verify 48 GB SO-DIMM support if 96 GB per node matters
      - GPU expansion is physically and thermally constrained; not a good fit for full-size, high-power NVIDIA GPUs used for local LLMs
      does_not_meet:
      - Required AMD Ryzen CPU family; MS-01 is Intel-based.
      - Required 96 GB RAM per node; MS-01 is commonly planned around a 64 GB practical ceiling.
      - Required OCuLink eGPU path; MS-01 has internal low-profile PCIe expansion, not the requested OCuLink port.
    pros:
    - Best Minisforum platform for Proxmox and clustered homelab use
    - 'Excellent networking: 10G SFP+ plus 2.5G Ethernet'
    - More internal storage and low-profile PCIe expansion than UM-series systems
    cons:
    - More expensive than UM-series options
    - RAM ceiling may be lower than the 96 GB upper target
    - Does not satisfy the preferred optional full-size internal GPU-node path
    - Not a strong local LLM GPU host because full-size GPUs do not fit cleanly and power/cooling headroom is limited
    purchase_sources:
    - Minisforum EU
    - Amazon.de
    - Amazon.pl
    - x-kom or Morele only if the exact Minisforum SKU and configuration are available
    notes:
    - Keep this as the best Minisforum networking/storage alternative when 10G SFP+, low-profile PCIe expansion, and storage flexibility matter more than OCuLink.
    - Do not choose it when OCuLink is mandatory; use UM890 Pro-class OCuLink/USB4 eGPU models or a non-mini-PC workstation/tower for that priority.
