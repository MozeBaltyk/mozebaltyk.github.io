  important_considerations:
  - 'The budget is interpreted as total cluster budget: estimated_total = unitary_price * 3.'
  - All listed options are Minisforum-only to satisfy the strict vendor constraint.
  - AliExpress remains disallowed; use Minisforum EU, Amazon.pl, Amazon.de, or verified local retailer listings.
  - For a high-RAM compact Minisforum alternative, include the cost of 96 GB DDR5 RAM and a 2 TB NVMe SSD per node before comparing prices.
