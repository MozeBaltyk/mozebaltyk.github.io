    best_value_option: Minisforum UM890 Pro, Ryzen 9 8945HS when OCuLink is required
    lowest_power_option: Minisforum UM790 Pro, Ryzen 9 7940HS
    best_networking_option: Minisforum MS-01, Core i5-12600H
    highest_performance_option: Minisforum UM890 Pro, Ryzen 9 8945HS
    most_expandable_option: Minisforum MS-01, Core i5-12600H for networking/storage and low-profile PCIe cards
    best_external_gpu_experiment_option: Minisforum UM890 Pro, Ryzen 9 8945HS if the exact SKU has OCuLink/USB4
