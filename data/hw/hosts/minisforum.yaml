  - model: Minisforum UM870 Slim
    reason: Good cheaper option, but weaker than MS-01, UM890 Pro, and UM790 Pro for this request because networking and expansion are less compelling.
  - model: Minisforum NAB9/NAD9
    reason: Not preferred because these are DDR4-era systems and the request requires DDR5.
