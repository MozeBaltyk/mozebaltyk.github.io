request:
  purpose: Recommend used/refurbished server host candidates for a home homelab node
  country: PL
  currency: EUR
  host_role: storage | virtualization
  form_factors:
  - tower
  - rackmount
  budget:
    per_unit:
      min: 335
      max: 835
      currency: EUR
  output:
    number_of_options: 3
    ranking_method: best_value
    include_alternatives: true
  purchase_preferences:
    condition: used | refurbished
    allow_barebone: false
    allow_aliexpress: false
    allow_chinese_brands: true
    preferred_sources:
    - AMSO
    - Poleasingowe.pl
    - Allegro
    - OLX
    - eBay.de
    - eBay.pl
    - EU IT refurbishers
  requirements:
    cpu:
      min_cores: 8
      min_threads: null
      min_passmark: null
    memory:
      min_ram_gb: 32
      max_ram_gb: null
      type: DDR4 ECC | DDR5 ECC
    storage:
      min_drive_bays: 2
      min_nvme_slots: null
      min_sata_ports: null
    networking:
      min_ethernet_ports: 1
      wifi_required: false
      min_ethernet_speed: 2.5G | 10G
      sfp_plus_required: false
    gpu_expansion:
      required: false
      slot_type: any
      external_gpu_ok: false
      preferred: true
      full_height_required: false
      full_length_required: false
    platform:
      proxmox_ready: true
      kubernetes_ready: true
      docker_ready: true
      ecc_required: false
      quicksync_required: false
    power_noise:
      max_idle_watts: null
      noise_priority: medium
  workloads:
  - Proxmox cluster
  - Docker containers
  - Kubernetes lab
  - Shared storage / NAS-style services
  - General VM workloads
  nice_to_have:
  - 10G SFP+ networking or inexpensive PCIe 10G upgrade path
  - ECC memory
  - Hot-swap drive bays
  - IPMI/iDRAC/iLO remote management
  - Spare PCIe slot after networking upgrade
  deal_breakers:
  - Barebone systems without CPU/RAM
  - AliExpress-only sourcing
  - Less than 32 GB RAM per node
  - Fewer than 2 internal drive bays
  - No practical path to 2.5G or 10G networking
answer:
