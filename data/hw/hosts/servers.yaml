    best_value_option: Dell PowerEdge R640, dual Xeon Silver 4110/4114 class
    lowest_power_option: Dell PowerEdge T440 / HPE ML350 Gen10 tower
    highest_performance_option: Dell PowerEdge R640, dual Xeon Silver 4110/4114 class
    most_expandable_option: Dell PowerEdge T440 / HPE ML350 Gen10 tower
    quietest_option: Dell PowerEdge T440 / HPE ML350 Gen10 tower
  important_considerations:
  - 'Budget is interpreted as total cluster budget: estimated_total = unitary_price * 3.'
  - Rack servers are loud and should not be assumed suitable for bedrooms or living rooms.
  - Idle power can dominate running cost; three rack servers may idle around 250-350 W combined.
  - For Proxmox and ZFS, verify RAID controller HBA/JBOD mode before buying.
  - Check whether drive caddies, blanks, rails, power supplies, and bezels are included.
  - Verify 10G NICs or OCP/FLR modules are included, or budget compatible PCIe adapters.
  - Remote management features can require iDRAC/iLO licensing; confirm license state per listing.
  - Used servers often ship without disks; storage media is not included unless explicitly stated.
