  workloads:
  - Proxmox cluster
  - Docker containers
  - Kubernetes lab
  nice_to_have:
  - Secondary PCIe slot for 2.5G or 10G NIC
  - Low-profile GPU slot remains free
  - Quiet refurbished business desktop
  deal_breakers:
  - No practical 2.5G or 10G networking path
  - No low-profile PCIe x16 slot
  - Less than 32 GB RAM per node
