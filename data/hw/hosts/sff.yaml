  important_considerations:
  - 'Budget is interpreted as total cluster budget: estimated_total = unitary_price * 3.'
  - The low-profile x16 slot is required for GPU expansion and must not be consumed by the networking upgrade.
  - Reject listings without a practical secondary PCIe slot for the NIC.
  - Most SFF business desktops ship with 1G Ethernet, so 2.5G/10G usually requires a PCIe NIC.
  - DDR5 refurb pricing varies sharply; confirm exact generation, memory type, caddies, brackets, and PSU.
  - Do not treat classic SFF desktops as the default for the revised AI/LLM lab if full-size RTX 4090/5090 support is required; choose tower/workstation nodes instead.
