    ranking_method: best_value
    last_reviewed: '2026-06-17'
    pricing_basis: 3-node cluster total; estimated_total = unitary_price * request.cluster.node_count
    pricing_confidence: medium
    constraint_note: Unitary price includes a complete used/refurbished DDR5 SFF PC plus a low-profile PCIe 2.5G NIC. The NIC must use a secondary PCIe slot so the low-profile x16 slot remains available for GPU expansion.
  summary:
    recommended_option: Lenovo ThinkCentre M90s Gen 4 SFF, Core i5-13500 plus low-profile 2.5G NIC
    rationale: Used/refurbished DDR5 SFF systems are tight inside a 1400 EUR total cluster budget. The Lenovo M90s Gen 4 is the best value when available from Polish or EU refurbishers because it combines a strong i5-13500, 32 GB DDR5, practical internal storage, and a secondary PCIe slot path for the required 2.5G NIC while preserving the low-profile x16 slot. This SFF category is not the right default for RTX 4090/5090-class OpenShift AI work; use tower/workstation nodes for full-size GPUs.
    ai_gpu_note: Classic SFF business desktops are useful CPU nodes or low-profile GPU experiment boxes, but they are not suitable for full-length multi-slot RTX 4090/5090 cards because of chassis size, PSU, power connector, and airflow limits.
