      - 8 CPU cores per node
      - 32 GB soldered RAM per node
      - One NVMe slot
      - Dual 2.5G Ethernet
      - Docker and lightweight Kubernetes ready
      partially_meets:
      - Second storage device is microSD/eMMC-class, not a drive bay
      - EU availability and exact accessory bundle must be checked
      does_not_meet: []
    pros:
    - Best networking of the SBC shortlist
    - Strong RK3588 CPU for ARM containers
    - Low power and compact
    cons:
    - ARM ecosystem is less convenient than x86 for general virtualization
    - Board, case, cooling, PSU, and storage may be separate purchases
    purchase_sources:
    - Amazon.pl
    - Amazon.de
    - Botland or Kamami if stocked
    - EU-stock marketplace sellers
    notes:
