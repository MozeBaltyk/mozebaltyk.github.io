request:
  purpose: Recommend SBC host candidates for a home homelab node
  country: PL
  currency: EUR
  host_role: sbc
  form_factors:
  - sbc
  budget:
    per_unit:
      min: 100
      max: 300
      currency: EUR
  output:
    number_of_options: 3
    ranking_method: best_value
    include_alternatives: true
  purchase_preferences:
    condition: new
    allow_barebone: true
    allow_aliexpress: false
    allow_chinese_brands: true
    preferred_sources:
    - Amazon.pl
    - Amazon.de
    - Botland
    - Kamami
    - BerryBase
    - Allnet EU
  requirements:
    cpu:
      min_cores: 8
      min_threads: null
      min_passmark: null
    memory:
      min_ram_gb: 32
      max_ram_gb: null
      type: null
    storage:
      min_drive_bays: null
      min_nvme_slots: 1
      min_sata_ports: null
    networking:
      min_ethernet_ports: 1
      wifi_required: false
      min_ethernet_speed: 1G | 2.5G
      sfp_plus_required: false
    gpu_expansion:
      required: false
      slot_type: none
      external_gpu_ok: false
      preferred: false
      full_height_required: false
      full_length_required: false
    platform:
      proxmox_ready: false
      kubernetes_ready: true
      docker_ready: true
      ecc_required: false
      quicksync_required: false
    power_noise:
      max_idle_watts: null
      noise_priority: medium
  workloads:
  - Docker containers
  - Lightweight Kubernetes lab
  - ARM Linux services
  nice_to_have:
  - 32 GB soldered RAM
  - 2.5G Ethernet
  - NVMe plus eMMC or microSD secondary storage
  deal_breakers:
  - AliExpress-only sourcing
  - Less than 8 CPU cores
  - Less than 32 GB RAM per node unless marked as alternative
answer:
  metadata:
    options_requested: 3
    options_returned: 3
    ranking_method: best_value
    last_reviewed: '2026-06-17'
    pricing_basis: 3-node cluster total; estimated_total = unitary_price * request.cluster.node_count
    pricing_confidence: medium
    constraint_note: PL/EU sourcing only, AliExpress excluded. RAM type is unconstrained, so soldered LPDDR is acceptable. SBC boards are treated as barebone nodes; storage estimates assume modest NVMe plus microSD/eMMC where needed.
  summary:
    recommended_option: Orange Pi 5 Plus 32GB
    rationale: The corrected request is ARM/container oriented rather than Proxmox oriented. RK3588-class 32 GB boards remain the best fit because they provide 8 cores, soldered 32 GB RAM, NVMe, low power draw, and 1G/2.5G networking within the 900 EUR total cluster budget when sourced from Amazon.pl, Amazon.de, or EU specialist sellers instead of AliExpress.
  options:
  - rank: 1
    model: Orange Pi 5 Plus 32GB with NVMe and microSD/eMMC storage
    vendor: Orange Pi
    condition: new
    sold_as: barebone SBC board
    estimated_total:
      amount: 687
      currency: EUR
    unitary_price:
