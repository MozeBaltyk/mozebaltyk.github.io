metadata:
  country: "PL"
  currency: "EUR"
  last_reviewed: "2026-06-17"
  purpose: "Top-level consistent 3-node homelab hardware proposal with possibility to add 1 extra-node with GPU capability"

default_recommendation:
  category: "tower_workstation"
  option: "Custom AM5 Ryzen 9 7900 general-purpose tower, 128 GB DDR5, 2 TB NVMe"
  rationale: "Best default for the revised goal because it gives three consistent general-purpose homelab nodes first, while preserving a clean path to add one fourth GPU-capable tower/workstation node later."
  upgrade_path: "Add one extra internal-PCIe GPU node with RTX 4090-class GPU first; treat RTX 5090-class hardware as a higher-risk path until driver, CUDA, container toolkit, and Kubernetes/OpenShift GPU Operator support are validated."

host_category_budgets:
  tower_workstation:
    recommended_option: "Custom AM5 Ryzen 9 7900 general-purpose tower, 128 GB DDR5, 2 TB NVMe"
    estimated_cluster_total:
      min: 4800
      max: 6600
      currency: "EUR"
    fit: "Best default for three consistent general-purpose homelab nodes, with the same platform family able to add one optional internal-GPU tower node."
  mini-pc:
    recommended_option: "GMKtec K8 Plus, Ryzen 7 8845HS"
    estimated_cluster_total:
      amount: 1230
      currency: "EUR"
    fit: "Budget quiet homelab fallback; no longer the default when a consistent 3-node tower baseline and optional internal-GPU fourth node are desired."
  minisforum:
    recommended_option: "Minisforum UM890 Pro, Ryzen 9 8945HS, OCuLink-capable SKU, 96 GB RAM"
    estimated_cluster_total:
      min: 2550
      max: 3150
      currency: "EUR"
    fit: "Best compact OCuLink/eGPU alternative; no longer the default once compactness is not required and internal GPU reliability matters more."
  sff:
    recommended_option: "Lenovo ThinkCentre M90s Gen 4 SFF, Core i5-13500 plus low-profile 2.5G NIC"
    estimated_cluster_total:
      amount: 1335
      currency: "EUR"
    fit: "Good refurbished x86 CPU-node value, but classic SFF business desktops are not suitable for full-size RTX 4090/5090-class GPUs."
  sbc:
    recommended_option: "Orange Pi 5 Plus 32GB"
    estimated_cluster_total:
      amount: 687
      currency: "EUR"
    fit: "Lowest-power container/Kubernetes lab, not the best VM or Proxmox platform."
  servers:
    recommended_option: "Dell PowerEdge R640, dual Xeon Silver 4110/4114 class"
    estimated_cluster_total:
      amount: 1950
      currency: "EUR"
    fit: "Best for ECC, remote management, drive bays, and VM density when noise and power are acceptable."

extra_costs_not_in_host_budgets:
  optional_gpu_node:
    typical_range:
      min: 1800
      max: 2400
      currency: "EUR"
    note: "One extra GPU-capable tower/workstation node before GPU; use full-length PCIe x16 slot, strong airflow case, and 1000-1200W ATX 3.0/3.1 PSU."
  gpu_package:
    typical_range:
      min: 1800
      max: 4200
      currency: "EUR"
    note: "One RTX 4090/5090-class internal GPU package for the optional fourth node; verify power cabling and airflow."

