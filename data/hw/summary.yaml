topology:
  base_nodes: 3
  optional_extra_nodes: 1
  optional_extra_node_role: "gpu_worker"
  note: "Budget and recommendation separate the consistent 3-node base cluster from the optional fourth GPU-capable node and GPU package."
  switch:
    typical_range:
      min: 90
      max: 500
      currency: "EUR"
    note: "Budget 90-190 EUR for unmanaged 2.5G, or 250-500 EUR for the recommended managed 8x 2.5G plus 2x 10G SFP+ switch; the full network package with cables/DAC allowance is typically 300-700 EUR."
  cables_transceivers:
    typical_range:
      min: 20
      max: 300
      currency: "EUR"
    note: "Short Cat6a patch cables are inexpensive; 10G SFP+ DACs, optics, or RJ45 modules can materially change total cost."
  ups:
    typical_range:
      min: 300
      max: 800
      currency: "EUR"
    note: "Size UPS by measured wall power and desired runtime, including the external GPU/ATX PSU path when the AI expansion is installed."
  rack_or_shelf:
    typical_range:
      min: 50
      max: 1000
      currency: "EUR"
    note: "Use ventilated tower placement, strong shelving, or a 19-inch open frame with shelves for the default tower build; compact 10-inch racks only fit mini-PC alternatives."
  storage_backup_contingency:
    typical_range:
      min: 150
      max: 1000
      currency: "EUR"
    note: "Host budgets often include boot/storage allowances only; reserve separate money for NAS disks, backup disks, replacement SSDs, and spares."

comparison:
  lowest_power: "sbc"
  quietest: "sbc"
  best_vm_platform: "servers"
  best_container_platform: "tower_workstation"
  best_storage_expandability: "servers"
  best_overall_home_choice: "tower_workstation"
  best_ai_lab_choice: "tower_workstation optional fourth GPU node"
  best_internal_gpu_choice: "tower_workstation optional fourth GPU node"
  best_oculink_choice: "minisforum"
  best_compact_choice: "minisforum"
  best_budget_choice: "mini-pc"
  best_networking_storage_minisforum_alternative: "Minisforum MS-01 when OCuLink is not required"
  avoid_for_living_space: "1U rackmount servers unless isolated in a utility room, garage, basement, or acoustic enclosure"

practical_warnings:
  - "Power cost matters: three tower nodes idle higher than mini PCs, and the optional GPU node can dominate power, heat, and noise. Measure wall power after deployment."
  - "Noise is placement-critical: rackmount servers and small high-RPM fans are poor bedroom or living-room choices."
  - "Used hardware value is listing-specific; check caddies, rails, PSUs, NICs, management licenses, BIOS locks, SMART data, and return terms."
  - "AliExpress is excluded in the host recommendations; cheaper AliExpress-only prices should not be mixed into these budgets."
  - "Verify the shared parts list before building three matched nodes because motherboard slot layout, RAM support, NVMe count, PSU cabling, case airflow, and NIC options determine upgrade safety."
  - "Host budgets do not include the full network package, UPS, rack/shelf accessories, long-term backup/storage contingency, optional fourth GPU node, or RTX GPU unless explicitly listed."
  - "128 GB per node is the target for the tower/workstation default; 96 GB per node is an acceptable lower-cost minimum."
  - "OCuLink eGPU remains useful for compact alternatives, but internal desktop PCIe x16 is preferred for the optional GPU-capable node."
